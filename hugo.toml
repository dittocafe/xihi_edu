# 核心：必须配置正确的 baseURL，末尾加 /
baseURL = "https://dittocafe.github.io/xihi_edu/"
title = "Xihi 留学伴读手记"
theme = "blowfish"
defaultContentLanguage = "zh"
enableInlineShortcodes = true
# 强制开启资源指纹，解决加载问题
resourceTypes = ["css", "js", "image"]

[languages.zh]
languageCode = "zh-CN"
languageName = "简体中文"
weight = 1

[params]
colorScheme = "blowfish"
defaultTheme = "light"
mainSections = ["posts"]
description = "一位美本留子家长的长期主义笔记。"
# 修复导航栏渲染
header = { sticky = true, showThemeToggle = true }

