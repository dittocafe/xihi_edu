name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # 自动同步所有图片（完全适配你的目录）
      - name: Sync Images
        run: |
          mkdir -p static/assets
          find content -name "*.png" -o -name "*.jpg" | xargs cp -t static/assets/ 2>/dev/null

      # ✅ ✅ ✅ 【绝对正确】sed 命令，无任何语法错误！
      - name: Convert Obsidian Links
        run: |
          find content -name "*.md" -exec sed -i 's#!\[\[assets/\#![\/assets\/\#g' {} \;
          find content -name "*.md" -exec sed -i 's\#\]\]#)#g' {} \;

      - name: Build
        run: hugo --minify

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    steps:
      - uses: actions/deploy-pages@v4