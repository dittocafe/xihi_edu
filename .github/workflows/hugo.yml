name: Deploy Hugo (Auto Sync Images & Links)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # 👇 核心1：自动把 content/posts/assets/ 的图片同步到 static/assets/
      - name: 同步图片到 static/assets
        run: |
          mkdir -p static/assets
          cp -r content/posts/assets/* static/assets/
          # 同步所有子目录的图片（如果有）
          find content/posts -type d -name "assets" -exec cp -r {}/* static/assets/ \;

      # 👇 核心2：自动转换Obsidian图片链接，从 [[content/posts/assets/xxx.png]] 转成 [](sslocal://flow/file_open?url=%2Fassets%2Fxxx.png&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)
      - name: 自动转换图片链接为Hugo格式
        run: |
          # 匹配 Obsidian 自动生成的 assets 路径，统一转成 /assets/
          find content -name "*.md" -type f -exec sed -i 's/!\[\[content\/posts\/assets\//g' {} +
          find content -name "*.md" -type f -exec sed -i 's/!\[\[assets\//g' {} +
          find content -name "*.md" -type f -exec sed -i 's/\]\]/)/g' {} +
          find content -name "*.md" -type f -exec sed -i 's/!\[\[/!\[\/assets\//g' {} +

      - name: Build site
        run: hugo --minify --gc --cleanDestinationDir

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4