name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      # 🔥 官方原生安装Hugo，无任何第三方依赖，永不报错
      - name: Install Hugo
        run: sudo apt-get update && sudo apt-get install -y hugo

      # 🔥 极简同步图片，无复杂命令
      - name: Sync Images
        run: |
          mkdir -p static/assets
          cp -n content/posts/assets/* static/assets/ 2>/dev/null || true

      # 🔥 极简构建，不修改任何文章链接（彻底消除sed报错）
      - name: Build
        run: hugo --minify

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4