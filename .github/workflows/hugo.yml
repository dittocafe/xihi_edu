name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 强制使用 Node.js 24，彻底消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      # ✅ 官方稳定Action，永远不会404 / 版本错误
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # ✅ 自动同步所有分类下的图片到 static
      - name: Sync Images
        run: |
          mkdir -p static/assets
          find content -type f -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | xargs cp -t static/assets/ 2>/dev/null || true

      # ✅ 自动转换Obsidian图片链接
      - name: Convert Links
        run: |
          find content -name "*.md" -exec sed -i 's/!\[\[/![\/assets\//g' {} +
          find content -name "*.md" -exec sed -i 's/\]\]/)/g' {} +

      # ✅ 构建网站
      - name: Build
        run: hugo --minify

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4