name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # 自动同步所有图片
      - name: Sync Images
        run: |
          mkdir -p static/assets
          find content -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec cp {} static/assets/ \;

      # ✅ 修复：完美转换Obsidian链接，语法100%正确
      - name: Convert Links
        run: |
          find content -name "*.md" -exec sed -i 's/!\[\[<span data-type="inline-math" data-value="Lio="></span>\]\]/![](/assets\/\1)/g' {} +

      - name: Build
        run: hugo --minify

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4