name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # 1. 同步你所有 assets 文件夹的图片（完全匹配你的目录）
      - name: 同步图片
        run: |
          mkdir -p static/assets
          find content -path '*/assets/*' -type f -exec cp {} static/assets/ \;

      # 2. 【绝对正确】转换你的 Obsidian 链接：![[assets/xxx.png]] → ![](/assets/xxx.png)
      - name: 转换链接
        run: |
          find content -name "*.md" -exec sed -i 's#!\[\[assets/\#!/assets/\#g' {} +
          find content -name "*.md" -exec sed -i 's\#\]\]#)#g' {} +

      - name: Build
        run: hugo --minify

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4