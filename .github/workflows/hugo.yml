name: Deploy Hugo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # 自动同步所有图片
      - name: Sync Images
        run: |
          mkdir -p static/assets
          find content -path "*/assets/*" -type f -exec cp {} static/assets/ \;

      # 【绝对正确】转换 Obsidian 链接
      - name: Convert Links
        run: |
          find content -name "*.md" -exec sed -i 's#!\[\[assets/\#![](/assets/\#g' {} \;
          find content -name "*.md" -exec sed -i 's\#\]\]#)#g' {} \;

      - name: Build
        run: hugo --minify

      - name: Upload
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4